  - id: e7-3
    title: "指标选择建议"
    description: "针对不同应用场景（自动驾驶、安防监控、医疗影像），应该优先关注哪个指标？为什么？"
    difficulty: challenge
    hints:
      - "自动驾驶：不能漏检（Recall 重要）"
      - "安防：误报成本低，漏报成本高（Recall > Precision）"
      - "医疗：误报和漏报都有严重后果（需要平衡）"
    solution: |
      自动驾驶：高 Recall（不能漏检行人）> Precision
      安防监控：高 Recall（宁可误报不能漏报）
      医疗影像：平衡 Precision 和 Recall，或优先 Recall
      垃圾邮件：高 Precision（不能误杀正常邮件）

